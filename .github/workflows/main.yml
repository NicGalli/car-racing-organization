#this will build a java project with maven
name: Java CI with Maven on linux
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-24.04	
#additional-maven-args: "-Pjacoco -Pdocker -DrepoToken=$COVERALLS_REPO_TOKEN coveralls:report"    
#jacoco-is-used: "-jacoco"
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: corretto
    - name: Cache m2 folder
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: m2-${{hashFiles('**/pom.xml', '**/*.yaml')}}
        restore-keys: m2-
    - name: Build with Maven
     run: >
        xvfb-run
        mvn verify 
        coveralls:report
        sonar:sonar 
        -Pjacoco
        #-Pmutation-testing not working yet
        # -DrepoToken=$COVERALLS_REPO_TOKEN
        # -Dsonar.projectKey=NicGalli_car-racing-organization
        # -Dsonar.host.url=https://sonarcloud.io
    - name: Coveralls
      uses: coverallsapp/github-action@v2
      env:
      # COVERALLS_REPO_TOKEN: ${{secrets.COVERALLS_TOKEN}} 
      # SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
