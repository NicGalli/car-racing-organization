<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Circuits</title>
</head>

<body>
	<h1>Edit Circuit</h1>
	<div th:unless="${message.empty}">
		<span th:text="${message}"></span>
	</div>
	<div th:if="${message.empty}">
		<form name="circuit_form" action="#" th:action="@{/circuits/save}" th:object="${circuit}" method="post">
			<input type="hidden" th:field="*{id}" />
			<p>
				Name: <input type="text" th:field="*{name}" />
			</p>
			<p>
				Length (m): <input type="text" th:field="*{length}" />
			</p>
			<button type="submit" name="btn_submit">Save</button>
			<button type="submit" name="btn_delete" th:if="${circuit.id != null}" th:formaction="@{'/circuits/delete/' +
				${circuit.id}}">
				Delete
			</button>
		</form>
	</div>

</html>
