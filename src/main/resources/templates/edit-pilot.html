<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Pilots</title>
</head>

<body>
	<h1>Edit Pilot</h1>
	<div th:unless="${message.empty}">
		<span th:text="${message}"></span>
	</div>
	<div th:if="${message.empty}">
		<form name="pilot_form" action="#" th:action="@{/pilots/save}" th:object="${pilot}" method="post">
			<input type="hidden" th:field="*{id}" />
			<p>
				Name: <input type="text" th:field="*{name}" />
			</p>
			<button type="submit" name="btn_submit">Save</button>
			<button type="submit" name="btn_delete" th:if="${pilot.id != null}" th:formaction="@{'/pilots/delete/' +
				${pilot.id}}">
				Delete
			</button>
		</form>
	</div>

</html>
